<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pi Bot Face</title>
<style>
html,body{margin:0;height:100%;background:#000;overflow:hidden}
canvas{width:100vw;height:100vh;display:block}
#status{position:fixed;left:8px;bottom:6px;font:12px monospace;color:rgba(255,255,255,.35)}
</style>
</head>
<body>
<canvas id="c" width="480" height="320"></canvas>
<div id="status">ws: connecting…</div>
<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
const statusEl=document.getElementById("status");
const W=480,H=320;

let state="idle";
let t0=performance.now();
let blink=0,blinkT=0,mouth=0,lookX=0,lookY=0;

function clamp01(v){return Math.max(0,Math.min(1,v))}
function rand(a,b){return a+Math.random()*(b-a)}

function connectWS(){
 const proto=(location.protocol==="https:")?"wss":"ws";
 const ws=new WebSocket(`${proto}://${location.host}/ws`);
 ws.onopen=()=>statusEl.textContent="ws: connected";
 ws.onclose=()=>{statusEl.textContent="ws: reconnecting";setTimeout(connectWS,700)};
 ws.onmessage=(ev)=>{
  try{
   const msg=JSON.parse(ev.data);
   if(msg.state) state=msg.state;
   if(typeof msg.mouth==="number") mouth=clamp01(msg.mouth);
  }catch{}
 };
}
connectWS();

function update(dt,now){
 blinkT-=dt;
 if(blinkT<=0){blinkT=rand(2.5,5.5);blink=1}
 if(blink>0){blink-=dt*8;if(blink<0)blink=0}

 if(state==="idle"){
  lookX=Math.sin(now*.0006)*.25;
  lookY=Math.sin(now*.0008)*.15;
  mouth*=.85;
 }
 else if(state==="listening"){
  lookX*=.9;lookY*=.9;mouth*=.85;
 }
 else if(state==="thinking"){
  lookX=Math.sin(now*.002)*.35;
  lookY=-.25+Math.sin(now*.0015)*.08;
  mouth*=.85;
 }
 else if(state==="speaking"){
  mouth=Math.max(mouth,.25+.25*Math.sin(now*.03));
  lookX*=.9;lookY*=.9;
 }
}

function draw(now){
 ctx.clearRect(0,0,W,H);
 ctx.fillStyle="#000";
 ctx.fillRect(0,0,W,H);

 const eyeY=130,eyeDX=110,eyeR=44,pupilR=14;

 function eye(cx,cy){
  ctx.strokeStyle="rgba(255,255,255,.9)";
  ctx.lineWidth=6;
  ctx.beginPath();
  ctx.arc(cx,cy,eyeR,0,Math.PI*2);
  ctx.stroke();

  if(blink>0){
   ctx.fillStyle="#000";
   const h=eyeR*2*blink;
   ctx.fillRect(cx-eyeR-6,cy-eyeR-6,(eyeR+6)*2,h+12);
  }

  const px=cx+lookX*12;
  const py=cy+lookY*10;
  ctx.fillStyle="rgba(255,255,255,.9)";
  ctx.beginPath();
  ctx.arc(px,py,pupilR,0,Math.PI*2);
  ctx.fill();
 }

 eye(W/2-eyeDX,eyeY);
 eye(W/2+eyeDX,eyeY);

 const mouthY=235,mouthW=150,mouthH=16+mouth*42;
 ctx.strokeStyle="rgba(255,255,255,.9)";
 ctx.lineWidth=6;
 ctx.beginPath();
 ctx.roundRect(W/2-mouthW/2,mouthY-mouthH/2,mouthW,mouthH,18);
 ctx.stroke();
}

function loop(now){
 const dt=Math.min(.05,(now-t0)/1000);
 t0=now;
 update(dt,now);
 draw(now);
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
